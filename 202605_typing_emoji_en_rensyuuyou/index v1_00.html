<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emoji English Typing Game</title>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --text-muted: #93a5b5;
            --text-main: #2c3e50;
            --color-primary: #3498db;
            --color-accent: #85d7ff;
            --color-error: #e74c3c;
            --stat-label: #7f8c8d;
            
            /* 【新設】入力背景カラー（ライトテーマ用：少し目の粗い白透過） */
            --panel-bg: rgba(234, 238, 236, 0.85); 
        }

        [data-theme="dark"] {
            --bg-color: #181a1b;
            --text-muted: #4e5a65;
            --text-main: #f5f6f7;
            --color-primary: #2980b9;
            --color-accent: #00a8ff;
            --color-error: #e74c3c;
            --stat-label: #7f8c8d;
            
            /* 【新設】入力背景カラー（ダークテーマ用：深い黒透過） */
            --panel-bg: rgba(36, 39, 41, 0.85); 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden;
            position: relative;
            user-select: none;
            z-index: 1; /* 1. 最背面：背景 */
        }

        #top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
            z-index: 20; /* 4. 最前面：メニュー類 */
        }

        .top-btn {
            background: none;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .top-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        /* 【新設】入力背景パネル（ゲーム要素の土台） */
        #game-bg-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 950px;
            height: 65vh;
            background-color: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(4px); /* 背景の絵文字をほんのりぼかすおしゃれエフェクト */
            z-index: 10; /* 3. 中面：入力背景 */
            pointer-events: none; /* クリックイベントなどを透過 */
            transition: background-color 0.3s ease;
        }

        #game-container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20; /* 4. 最前面：すべての文字情報 */
        }

        #stats-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .stat-box { text-align: left; color: var(--stat-label); }
        .stat-value { font-size: 42px; color: var(--color-accent); font-weight: bold; }

        .line-container {
            font-size: 28px;
            letter-spacing: 2px;
            word-wrap: break-word;
            user-select: none;
            margin: 25px 0;
            min-height: 45px;
            line-height: 1.5;
        }
        #prev-line { color: var(--text-muted); font-size: 22px; opacity: 0.4; }
        #current-line { font-size: 38px; color: var(--text-main); }
        #next-line { color: var(--text-muted); font-size: 22px; opacity: 0.4; }

        .char-box {
            position: relative;
            display: inline;
        }
        .correct { color: var(--text-muted); opacity: 0.4; }
        .incorrect { color: var(--color-error); border-bottom: 2px solid var(--color-error); }
        .current-char { color: var(--color-primary); border-left: 2px solid var(--color-primary); }

        #info { margin-top: 40px; font-size: 14px; color: var(--text-muted); min-height: 20px; }
        #version { position: absolute; bottom: 20px; font-size: 12px; color: var(--text-muted); opacity: 0.6; z-index: 20; }

        /* === 🎆 2. 背面：エフェクト用のz-index調整 === */
        .emoji-effect {
            position: fixed;
            font-size: 3.5rem;
            pointer-events: none;
            z-index: 5; /* 2. 背面：背景と入力背景の間に挟む */
            will-change: transform, opacity;
        }

        @keyframes float-up {
            0% { transform: translateY(105vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; transform: translateY(90vh) translateX(var(--drift)) scale(1.2); }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(calc(var(--drift) * 2)) scale(1); opacity: 0; }
        }

        @keyframes rain-down {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(var(--spin)); opacity: 0; }
        }

        @keyframes cross-screen {
            0% { left: var(--start-x); transform: translateY(0) scale(1) var(--flip, scaleX(1)); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(var(--wave-y)) scale(1.3) var(--flip, scaleX(1)); }
            90% { opacity: 1; }
            100% { left: var(--end-x); transform: translateY(0) scale(1) var(--flip, scaleX(1)); opacity: 0; }
        }

        @keyframes vortex-spin {
            0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); top: 50vh; left: 50vw; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--vortex-x)), calc(-50% + var(--vortex-y))) scale(1.5) rotate(var(--vortex-rot)); top: 50vh; left: 50vw; opacity: 0; }
        }

        @keyframes zoom-splash {
            0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); top: 50vh; left: 50vw; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translate(calc(-50% + var(--move-x)), calc(-50% + var(--move-y))) scale(4) rotate(var(--spin)); top: 50vh; left: 50vw; opacity: 0; }
        }
    </style>
</head>
<body>

<div id="top-bar">
    <button id="theme-toggle" class="top-btn" onclick="toggleTheme()">🌙 NIGHT MODE</button>
</div>

<div id="game-bg-panel"></div>

<div id="game-container">
    <div id="stats-container">
        <div class="stat-box"><div>TIME</div><div id="stat-time" class="stat-value">0s</div></div>
        <div class="stat-box"><div>KPM</div><div id="stat-kpm" class="stat-value">0</div></div>
        <div class="stat-box"><div>ACC</div><div id="stat-acc" class="stat-value">100%</div></div>
    </div>

    <div id="prev-line" class="line-container"></div>
    <div id="current-line" class="line-container"></div>
    <div id="next-line" class="line-container"></div>
    
    <div id="info">Press any key to start typing!</div>
</div>

<div id="version">Monkeytype-Style Emoji English Typing v1.2</div>

<script src="data.js"></script>

<script>
const wordPool = window.wordPool || [];

let prevLineText = ""; 
let currentLineText = ""; 
let nextLineText = "";
let currentLineSpans = []; 
let currentCharIndex = 0; 
let wordSegments = []; 
let correctTypeCount = 0; 
let incorrectTypeCount = 0; 
let startTime = null; 
let timerInterval = null;

function generateRandomLine() {
    if (wordPool.length === 0) return "hello world test typing game";
    let lineWords = [];
    const targetCount = 5; 
    for(let i = 0; i < targetCount; i++) {
        const item = wordPool[Math.floor(Math.random() * wordPool.length)];
        lineWords.push(item.word);
    }
    return lineWords.join(" ") + " ";
}

function initGame() {
    prevLineText = "";
    currentLineText = generateRandomLine();
    nextLineText = generateRandomLine();
    correctTypeCount = 0; 
    incorrectTypeCount = 0; 
    startTime = null; 
    if (timerInterval) clearInterval(timerInterval);
    
    document.getElementById("stat-time").innerText = "0s";
    document.getElementById("stat-kpm").innerText = "0";
    document.getElementById("stat-acc").innerText = "100%";
    document.getElementById("info").innerText = "Press any key to start typing!";
    renderLines();
}

function renderLines() {
    document.getElementById("prev-line").innerText = prevLineText;
    document.getElementById("next-line").innerText = nextLineText;

    const currentContainer = document.getElementById("current-line");
    currentContainer.innerHTML = "";
    currentLineSpans = [];
    currentCharIndex = 0;
    wordSegments = [];

    const tokens = currentLineText.split(/(\s+)/).filter(t => t.length > 0);
    let tempIndex = 0;
    
    tokens.forEach(token => {
        const cleanWord = token.trim().toLowerCase();
        const matches = wordPool.filter(item => item.word && item.word.toLowerCase() === cleanWord);
        const matchedData = matches.length > 0 ? matches[Math.floor(Math.random() * matches.length)] : null;
        const end = tempIndex + token.length - 1;

        for (let i = 0; i < token.length; i++) {
            const span = document.createElement("span");
            span.innerText = token[i];
            span.className = "char-box";
            currentContainer.appendChild(span);
            currentLineSpans.push(span);
        }

        if (cleanWord.length > 0 && matchedData) {
            wordSegments.push({ endIndex: end, data: matchedData });
        }
        tempIndex += token.length;
    });

    if (currentLineSpans.length > 0) {
        currentLineSpans[0].classList.add("current-char");
    }
}

function advanceRow() {
    prevLineText = currentLineText;
    currentLineText = nextLineText;
    nextLineText = generateRandomLine();
    renderLines();
}

function updateStats() {
    if (!startTime) return;
    const elapsedSeconds = (Date.now() - startTime) / 1000;
    document.getElementById("stat-time").innerText = Math.floor(elapsedSeconds) + "s";
    let kpm = 0;
    if (elapsedSeconds > 0) kpm = Math.round(correctTypeCount / (elapsedSeconds / 60));
    document.getElementById("stat-kpm").innerText = kpm;
    const totalInput = correctTypeCount + incorrectTypeCount;
    document.getElementById("stat-acc").innerText = totalInput > 0 ? Math.round((correctTypeCount / totalInput) * 100) + "%" : "100%";
}

function toggleTheme() {
    const body = document.body; 
    const btn = document.getElementById("theme-toggle");
    if (body.getAttribute("data-theme") === "dark") { 
        body.removeAttribute("data-theme"); 
        btn.innerText = "🌙 NIGHT MODE"; 
    } else { 
        body.setAttribute("data-theme", "dark"); 
        btn.innerText = "☀️ LIGHT MODE"; 
    }
}

window.addEventListener("keydown", (e) => {
    if (e.key.length !== 1) return;
    const pressedKey = e.key; 
    if (currentCharIndex >= currentLineSpans.length) return;

    if (!startTime) {
        startTime = Date.now();
        document.getElementById("info").innerText = "Typing...";
        timerInterval = setInterval(updateStats, 200);
    }

    const targetKey = currentLineText[currentCharIndex];

    if (pressedKey.toLowerCase() === targetKey.toLowerCase()) {
        correctTypeCount++;
        currentLineSpans[currentCharIndex].classList.remove("current-char", "incorrect");
        currentLineSpans[currentCharIndex].classList.add("correct");

        const finishedSegment = wordSegments.find(seg => seg.endIndex === currentCharIndex);
        if (finishedSegment) {
            const data = finishedSegment.data;
            let emojiPool = [];
            if (data.emojis && data.emojis.length > 0) emojiPool = data.emojis;
            else if (data.emoji) emojiPool = [data.emoji];

            if (emojiPool.length > 0) {
                triggerEmojiAnimation(emojiPool, data.effect, data.facing);
            }
        }

        currentCharIndex++;
        if (currentCharIndex < currentLineSpans.length) {
            currentLineSpans[currentCharIndex].classList.add("current-char");
        } else {
            advanceRow();
        }
    } else {
        incorrectTypeCount++;
        currentLineSpans[currentCharIndex].classList.add("incorrect");
    }
    updateStats();
});

function triggerEmojiAnimation(emojiPool, specifiedEffect, facing) {
    let selectedType = "";
    const allTypes = ['up', 'rain', 'cross', 'vortex', 'zoom'];

    if (specifiedEffect) {
        if (Array.isArray(specifiedEffect)) {
            selectedType = specifiedEffect[Math.floor(Math.random() * specifiedEffect.length)];
        } else if (allTypes.includes(specifiedEffect)) {
            selectedType = specifiedEffect;
        }
    }
    if (!selectedType) {
        selectedType = allTypes[Math.floor(Math.random() * allTypes.length)];
    }

    const minCount = 8;
    const maxCount = 18;
    const spawnCount = Math.floor(Math.random() * (maxCount - minCount + 1)) + minCount;

    if (selectedType === 'up') {
        for (let i = 0; i < spawnCount; i++) {
            const randomEmoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            setTimeout(() => {
                createEmojiElement(randomEmoji, {
                    animationName: 'float-up',
                    duration: 2 + Math.random() * 1.5 + 's',
                    left: 15 + Math.random() * 70 + 'vw',
                    customVars: { '--drift': (Math.random() - 0.5) * 250 + 'px' }
                });
            }, i * 100);
        }
    } 
    else if (selectedType === 'rain') {
        for (let i = 0; i < spawnCount; i++) {
            const randomEmoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            setTimeout(() => {
                createEmojiElement(randomEmoji, {
                    animationName: 'rain-down',
                    duration: 1.5 + Math.random() * 2 + 's',
                    left: Math.random() * 100 + 'vw',
                    top: '-10vh',
                    customVars: { '--spin': (Math.random() > 0.5 ? 360 : -360) * (1 + Math.random() * 2) + 'deg' }
                });
            }, i * 80);
        }
    } 
    else if (selectedType === 'cross') {
        const goRight = Math.random() > 0.5;
        let flipValue = goRight ? 'scaleX(1)' : 'scaleX(-1)';
        if (facing === 'left') flipValue = goRight ? 'scaleX(-1)' : 'scaleX(1)';
        else if (facing === 'right') flipValue = goRight ? 'scaleX(1)' : 'scaleX(-1)';

        for (let i = 0; i < spawnCount; i++) {
            const randomEmoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            setTimeout(() => {
                createEmojiElement(randomEmoji, {
                    animationName: 'cross-screen',
                    duration: 2.5 + Math.random() * 1.5 + 's',
                    top: 20 + Math.random() * 60 + 'vh',
                    customVars: {
                        '--start-x': goRight ? '-10vw' : '110vw',
                        '--end-x': goRight ? '110vw' : '-10vw',
                        '--wave-y': (Math.random() - 0.5) * 180 + 'px',
                        '--flip': flipValue
                    }
                });
            }, i * 120);
        }
    }
    else if (selectedType === 'vortex') {
        for (let i = 0; i < spawnCount; i++) {
            const randomEmoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            const angle = (i * 0.4) + (Math.random() * 0.2); 
            const radius = 300 + Math.random() * 250; 
            const vx = Math.cos(angle) * radius + 'px';
            const vy = Math.sin(angle) * radius + 'px';

            setTimeout(() => {
                createEmojiElement(randomEmoji, {
                    animationName: 'vortex-spin',
                    duration: 1.2 + Math.random() * 0.6 + 's',
                    customVars: {
                        '--vortex-x': vx,
                        '--vortex-y': vy,
                        '--vortex-rot': (720 + Math.random() * 360) + 'deg'
                    }
                });
            }, i * 60); 
        }
    }
    else if (selectedType === 'zoom') {
        for (let i = 0; i < spawnCount; i++) {
            const randomEmoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            const angle = Math.random() * Math.PI * 2;
            const distance = 200 + Math.random() * 300;
            const moveX = Math.cos(angle) * distance + 'px';
            const moveY = Math.sin(angle) * distance + 'px';

            setTimeout(() => {
                createEmojiElement(randomEmoji, {
                    animationName: 'zoom-splash',
                    duration: 0.8 + Math.random() * 0.6 + 's',
                    customVars: {
                        '--move-x': moveX,
                        '--move-y': moveY,
                        '--spin': (Math.random() - 0.5) * 720 + 'deg'
                    }
                });
            }, i * 50);
        }
    }
}

function createEmojiElement(emoji, config) {
    const el = document.createElement('div');
    el.className = 'emoji-effect';
    el.innerText = emoji;
    el.style.display = 'inline-block'; 
    
    if (config.left) el.style.left = config.left;
    if (config.top) el.style.top = config.top;
    if (config.customVars) {
        Object.keys(config.customVars).forEach(key => { el.style.setProperty(key, config.customVars[key]); });
    }
    el.style.animation = `${config.animationName} ${config.duration} cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => { el.remove(); });
}

initGame();
</script>

</body>
</html>
