<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live2D Portfolio - Ramnade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="./live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading">Ramnade を召喚中...</div>

    <script>
        (async function() {
            const loadingText = document.getElementById('loading');

            const app = new PIXI.Application({
                view: document.createElement('canvas'),
                autoStart: true,
                resizeTo: window,
                transparent: true,
                antialias: true,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true
            });
            document.body.appendChild(app.view);

            try {
                const model = await PIXI.live2d.Live2DModel.from('./model/2026Ramnade.model3.json');
                app.stage.addChild(model);

                // --- 1. モデルの配置設定 ---
function fitModel() {
    // 画面サイズを再取得してキャンバスを更新
    app.renderer.resize(window.innerWidth, window.innerHeight);

    const isLandscape = app.screen.width > app.screen.height;

    if (isLandscape) {
        // --- 【横長の時：顔アップ】 ---
        // 高さに合わせてかなり大きく（2.5倍くらい）する
        const scale = (app.screen.height / model.height) * 0.4;
        model.scale.set(scale);

        // 基準点を「顔（上の方）」にする
        // 0.1 ～ 0.2 くらいで Ramnade の顔が真ん中に来るよう調整してね
        model.anchor.set(0.5, 0.15); 
        
        model.x = app.screen.width / 2;
        model.y = app.screen.height * 0.5; // 画面の真ん中に顔が来る

    } else {
        // --- 【縦長の時：全身姿】 ---
        // 高さに収まるように調整（画面の90%くらいのサイズ）
        const scale = (app.screen.height / model.height) * 0.;
        model.scale.set(scale);

        // 基準点を「体の中央」にする
        model.anchor.set(0.5, 0.5);
        
        model.x = app.screen.width / 2;
        model.y = app.screen.height * 0.5;
    }
}

                fitModel();
                window.addEventListener('resize', fitModel);
                setTimeout(fitModel, 100);
                // --- 2. 呼吸・まばたき・視線追従の有効化 ---
                model.interactive = true;
                
                // 呼吸などの自動アップデートを有効にする設定
                model.internalModel.motionManager.update = (...args) => {
                    model.internalModel.motionManager.constructor.prototype.update.call(model.internalModel.motionManager, ...args);
                };

                // --- 3. クリックで笑顔（表情制御） ---// --- 3. クリックで笑顔（表情制御） ---
// --- 3. クリックで笑顔（なめらかアニメーション版） ---
                let isSmiling = false;
                let smileProgress = 0; // 0(真顔) ～ 1(満面の笑み) の現在の進捗
                const transitionSpeed = 0.15; // 変化の速さ（0.5秒くらいで変化する設定）

                model.on('pointertap', () => {
                    if (!isSmiling) {
                        isSmiling = true;
                        console.log("Ramnadeがなめらかに笑顔になります！");
                        
                        // 2.5秒後に笑顔フラグを下ろす
                        setTimeout(() => { 
                            isSmiling = false; 
                        }, 2500);
                    }
                });

// 毎フレームの更新処理（deltaを追加）
                app.ticker.add((delta) => {
                    // delta は、理想の速度(60FPS)に対してどれくらい時間がかかったかの倍数です
                    // これを掛けることで、処理落ちしてもアニメーションの「時間」を一定に保てます
                    const adjustedSpeed = transitionSpeed * delta;

                    if (isSmiling) {
                        smileProgress = Math.min(1.0, smileProgress + adjustedSpeed);
                    } else {
                        smileProgress = Math.max(0, smileProgress - adjustedSpeed);
                    }

                    // パラメータに適用
                    model.internalModel.coreModel.setParameterValueById('ParamEyeLSmile', smileProgress);
                    model.internalModel.coreModel.setParameterValueById('ParamEyeRSmile', smileProgress);
                    model.internalModel.coreModel.setParameterValueById('ParamMouthForm', smileProgress);
                    model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', smileProgress);
                });
                loadingText.style.display = 'none';

            } catch (e) {
                loadingText.innerText = "読み込みエラーが発生しました";
                console.error(e);
            }
        })();
    </script>
</body>
</html>
