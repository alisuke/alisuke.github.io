<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio - Ramnade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="./live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #afeeee; /* 爽やかな水色 */
            font-family: sans-serif; 
        }

        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; pointer-events: none; z-index: 10; }

        /* --- 浮かぶ泡のスタイル --- */
        .bubble {
            position: absolute;
            bottom: -50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 0;
            animation: rise linear infinite, sway ease-in-out infinite;
        }

        @keyframes rise {
            0% { bottom: -50px; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { bottom: 105vh; opacity: 0; }
        }

        @keyframes sway {
            0% { transform: translateX(0); }
            50% { transform: translateX(15px); }
            100% { transform: translateX(0); }
        }

        /* UI要素 */
        .side-menu { position: fixed; top: 50%; left: 20px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s; }
        .icon-btn:hover { transform: scale(1.1); background: white; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 200; opacity: 0; transition: opacity 0.3s; }
        .overlay.active { display: flex; opacity: 1; }
        .info-card { background: rgba(255, 255, 255, 0.9); width: 85%; max-width: 500px; padding: 30px; border-radius: 24px; position: relative; color: #333; }
        .close-btn { margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 12px; background: #000; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading">Ramnade を召喚中...</div>

    <div class="side-menu">
        <button class="icon-btn" onclick="setExpression('smile')">✨</button>
        <button class="icon-btn" onclick="setExpression('surprise')">😲</button>
        <button class="icon-btn info" onclick="openInfo()">ℹ️</button>
    </div>

    <div id="infoOverlay" class="overlay">
        <div class="info-card">
            <h3>作品名</h3>
            <div class="content">ラムネード様のファンアート(2026年3月版)</div>
            <h3>作品詳細</h3>
            <span class="label">【担当作業】</span>
            <div class="content">
                ・イラスト作成、パーツ分け<br>
                ・メッシュ割り、リギング<br>
                ・(Geminiによる)Web SDKへの組み込み、表情実装
            </div>

            <span class="label">【制作期間】</span>
            <div class="content">約10日</div>

            <span class="label">【コメント】</span>
            <div class="content">
                数年ぶりのLive2dで制作を行いました。<br>
                操作を思い出す＋aiueoの口に対応するのを目標としました。<br>
            <button class="close-btn" onclick="closeInfo()">作品に戻る</button>
            </div>
        </div>
    </div>

    <script>
        (async function() {
            const loadingText = document.getElementById('loading');
            const overlay = document.getElementById('infoOverlay');

            const app = new PIXI.Application({
                view: document.createElement('canvas'),
                autoStart: true,
                resizeTo: window,
                transparent: true,
                antialias: true,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true
            });
            document.body.appendChild(app.view);

            // --- 泡の生成（サイズ x0.4 / スピード x1.5） ---
            function createBubbles() {
                const bubbleCount = 60; // 少し小さくなったので数を微増させると綺麗です

                for (let i = 0; i < bubbleCount; i++) {
                    const bubble = document.createElement('div');
                    bubble.classList.add('bubble');

                    // サイズ調整: 8px ～ 32px
                    const size = Math.random() * 24 + 8;
                    bubble.style.width = `${size}px`;
                    bubble.style.height = `${size}px`;

                    bubble.style.left = `${Math.random() * 100}%`;
                    bubble.style.animationDelay = `${Math.random() * 8}s`;

                    // スピード調整 (rise: 6.6s ～ 13.3s / sway: 2s ～ 3.3s)
                    const riseDuration = Math.random() * 6.7 + 6.7;
                    const swayDuration = Math.random() * 1.3 + 2.0;
                    bubble.style.animationDuration = `${riseDuration}s, ${swayDuration}s`;

                    document.body.appendChild(bubble);
                }
            }

            try {
                const model = await PIXI.live2d.Live2DModel.from('./model/2026ramnade.model3.json');
                app.stage.addChild(model);

                function fitModel() {
                    const w = window.innerWidth; const h = window.innerHeight;
                    app.renderer.resize(w, h);
                    if (w > h) { model.scale.set((h / model.height) * 1.8); model.anchor.set(0.5, 0.12); }
                    else { model.scale.set((h / model.height) * 0.94); model.anchor.set(0.5, 0.5); }
                    model.x = w / 2; model.y = h / 2;
                }
                fitModel();
                window.addEventListener('resize', () => { setTimeout(fitModel, 200); });

                model.interactive = true;
                model.internalModel.motionManager.update = (...args) => {
                    model.internalModel.motionManager.constructor.prototype.update.call(model.internalModel.motionManager, ...args);
                };

                const expressions = {
                    normal:   { smile: 0, eyeball: 0, brow: 0, mForm: 0, mOpen: 0 },
                    smile:    { smile: 1.0, eyeball: 0, brow: 0, mForm: 1.0, mOpen: 1.0 },
                    surprise: { smile: 0, eyeball: -1.0, brow: 0.5, mForm: 0, mOpen: 0.2 }
                };
                let current = { ...expressions.normal };
                let targetName = 'normal';
                let timer = null;

                window.setExpression = (name) => {
                    targetName = name;
                    clearTimeout(timer);
                    if (name !== 'normal') timer = setTimeout(() => { targetName = 'normal'; }, 2500);
                };

                window.openInfo = () => { overlay.classList.add('active'); };
                window.closeInfo = () => { overlay.classList.remove('active'); };

                
                app.ticker.add((delta) => {
                    const speed = 0.1 * delta;
                    const target = expressions[targetName];
                    for (let key in current) {
                        if (current[key] < target[key]) current[key] = Math.min(target[key], current[key] + speed);
                        else if (current[key] > target[key]) current[key] = Math.max(target[key], current[key] - speed);
                    }
                    model.internalModel.coreModel.setParameterValueById('ParamEyeLSmile', current.smile);
                    model.internalModel.coreModel.setParameterValueById('ParamEyeRSmile', current.smile);
                    model.internalModel.coreModel.setParameterValueById('ParamEyeBallForm', current.eyeball);
                    model.internalModel.coreModel.setParameterValueById('ParamBrowLForm', current.brow);
                    model.internalModel.coreModel.setParameterValueById('ParamBrowRForm', current.brow);
                    model.internalModel.coreModel.setParameterValueById('ParamMouthForm', current.mForm);
                    model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', current.mOpen);
                });

                createBubbles();
                loadingText.style.display = 'none';
            } catch (e) { console.error(e); }
        })();
    </script>
</body>
</html>
