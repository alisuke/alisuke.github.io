<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>QWERTYプレビュー・記号拡張版</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        #keyboard {
            background: #333;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }

        .row {
            display: flex;
            margin-bottom: 6px;
        }

        /* 段差（ロウスタッガード）の微調整 */
        .row-2 { margin-left: 25px; }
        .row-3 { margin-left: 55px; }

        .key {
            width: 50px;
            height: 50px;
            background: #444;
            margin: 3px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 4px solid #222;
            transition: background 0.05s;
        }

        /* 記号キーなどは少し文字を小さく */
        .key.symbol { font-size: 1.3rem; color: #aaa; }

        /* キーが押された時 */
        .key.active {
            background: #00ffcc;
            color: #1a1a1a;
            border-bottom: none;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

    <h1 style="color:#666; margin-bottom: 20px;">Keyboard Preview (QWERTY)</h1>

    <div id="keyboard">
        <div class="row">
            <div class="key" id="key-q">Q</div>
            <div class="key" id="key-w">W</div>
            <div class="key" id="key-e">E</div>
            <div class="key" id="key-r">R</div>
            <div class="key" id="key-t">T</div>
            <div class="key" id="key-y">Y</div>
            <div class="key" id="key-u">U</div>
            <div class="key" id="key-i">I</div>
            <div class="key" id="key-o">O</div>
            <div class="key" id="key-p">P</div>
            <div class="key symbol" id="key-[">[</div>
            <div class="key symbol" id="key-]">]</div>
        </div>

        <div class="row row-2">
            <div class="key" id="key-a">A</div>
            <div class="key" id="key-s">S</div>
            <div class="key" id="key-d">D</div>
            <div class="key" id="key-f">F</div>
            <div class="key" id="key-g">G</div>
            <div class="key" id="key-h">H</div>
            <div class="key" id="key-j">J</div>
            <div class="key" id="key-k">K</div>
            <div class="key" id="key-l">L</div>
            <div class="key symbol" id="key-;">;</div>
            <div class="key symbol" id="key-'">'</div>
        </div>

        <div class="row row-3">
            <div class="key" id="key-z">Z</div>
            <div class="key" id="key-x">X</div>
            <div class="key" id="key-c">C</div>
            <div class="key" id="key-v">V</div>
            <div class="key" id="key-b">B</div>
            <div class="key" id="key-n">N</div>
            <div class="key" id="key-m">M</div>
            <div class="key symbol" id="key-,">,</div>
            <div class="key symbol" id="key-.">.</div>
            <div class="key symbol" id="key-/">/</div>
        </div>
    </div>

    <script>
        // キー入力を受け取って光らせる
        // 特殊な記号も e.key でそのまま取得できるものをIDにしています
        window.addEventListener('keydown', (e) => {
            const keyName = e.key.toLowerCase();
            const el = document.getElementById('key-' + keyName);
            if (el) el.classList.add('active');
        });

        window.addEventListener('keyup', (e) => {
            const keyName = e.key.toLowerCase();
            const el = document.getElementById('key-' + keyName);
            if (el) el.classList.remove('active');
        });
    </script>

</body>
</html>
